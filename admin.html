<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Lovely Bites</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <div id="login-section" class="flex h-screen items-center justify-center">
        <button onclick="adminLogin()" class="bg-red-600 text-white px-6 py-3 rounded-lg font-bold">
            Login as Admin
        </button>
    </div>

    <div id="admin-panel" class="hidden p-8">
        <h1 class="text-2xl font-bold mb-6">Admin Control Panel</h1>
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl mb-4">Manage Orders</h2>
            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-3 text-left">Order ID</th>
                        <th class="p-3 text-left">Customer Details</th>
                        <th class="p-3 text-left">Status</th>
                    </tr>
                </thead>
                <tbody id="admin-orders-body"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>

    <script>
        const db = firebase.firestore();

        // 1. Google Login
        async function adminLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await firebase.auth().signInWithPopup(provider);
                checkAdminRole(result.user);
            } catch (error) { console.error("Login Error:", error); }
        }

        // 2. Check Admin Role
        async function checkAdminRole(user) {
            const adminDoc = await db.collection("admins").doc(user.email).get();
            if (adminDoc.exists) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadOrders();
            } else {
                alert("Access Denied: You are not authorized!");
                firebase.auth().signOut();
            }
        }

        // 3. Load Orders
        function loadOrders() {
            const tbody = document.getElementById('admin-orders-body');
            db.collection("orders").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                tbody.innerHTML = "";
                snapshot.forEach(doc => {
                    const order = doc.data();
                    tbody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3">${order.orderId || 'N/A'}</td>
                            <td class="p-3">${order.name}<br><span class="text-sm text-gray-500">₹${order.total}</span></td>
                            <td class="p-3">
                                <select onchange="updateStatus('${doc.id}', this.value)" class="border p-1 rounded">
                                    <option value="Pending" ${order.status == 'Pending' ? 'selected' : ''}>Pending</option>
                                    <option value="Shipped" ${order.status == 'Shipped' ? 'selected' : ''}>Shipped</option>
                                    <option value="Delivered" ${order.status == 'Delivered' ? 'selected' : ''}>Delivered</option>
                                </select>
                            </td>
                        </tr>`;
                });
            });
        }

        // 4. Update Status
        function updateStatus(docId, newStatus) {
            db.collection("orders").doc(docId).update({ status: newStatus })
            .then(() => console.log("Status Updated"));
        }
    </script>
</body>
</html>
