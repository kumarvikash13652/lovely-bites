<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful | Lovely Bites</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f9f9f9; text-align: center; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; width: 90%; }
        h1 { color: #28a745; }
        .order-id { font-weight: bold; color: #555; margin: 20px 0; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #b7171c; color: white; text-decoration: none; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Order Placed!</h1>
        <p>Thank you for shopping with Lovely Bites. We have received your order.</p>
        
        <div class="order-id" id="order-number-display">
            </div>

        <p>Our team will contact you shortly for confirmation.</p>
        
        <a href="index.html" class="btn">Back to Home</a>
    </div>

    <script>
        // URL se Order ID nikalne ka logic
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');

        if (orderId) {
            document.getElementById('order-number-display').innerText = "Order ID: " + orderId;
        } else {
            document.getElementById('order-number-display').innerText = "Order confirmed!";
        }
    </script>
</body>
</html>
