<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders | Lovely Bites</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .order-card { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .status { color: #e31e24; font-weight: bold; }
    </style>
</head>
<body>

    <h2>My Orders</h2>
    <div id="orders-container">Loading your orders...</div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // FIREBASE CONFIGURATION (Apna yahan paste karo)
        const firebaseConfig = {
            // apiKey: "...",
            // authDomain: "...",
            // projectId: "...",
            // ...
        };
        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();

        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                window.location.href = "login.html"; 
                return;
            }

            const container = document.getElementById('orders-container');

            // Order fetch karna
            db.collection("orders")
                .where("userId", "==", user.uid)
                .orderBy("timestamp", "desc")
                .onSnapshot(snapshot => {
                    if (snapshot.empty) {
                        container.innerHTML = "You have no orders yet.";
                        return;
                    }

                    container.innerHTML = "";
                    snapshot.forEach(doc => {
                        const order = doc.data();
                        
                        // Items ka list banana
                        let itemsHtml = order.items.map(item => `
                            <div class="order-item">
                                <span>${item.productName} (x${item.qty})</span>
                                <span>₹${(item.price * item.qty).toFixed(2)}</span>
                            </div>
                        `).join('');

                        container.innerHTML += `
                            <div class="order-card">
                                <h3>Order ID: ${doc.id.slice(-6)}</h3>
                                <p>Status: <span class="status">${order.status || 'Pending'}</span></p>
                                <div>${itemsHtml}</div>
                                <hr>
                                <p><strong>Total Amount: ₹${order.total}</strong></p>
                            </div>
                        `;
                    });
                }, error => {
                    container.innerHTML = "Error loading orders. Check console.";
                    console.error("Firestore Error: ", error);
                });
        });
    </script>
    
    <script src="cart-system.js"></script>
</body>
</html>
