<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | Lovely Bites</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .order-card { background: white; padding: 20px; margin: 15px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .status { color: #e31e24; font-weight: bold; }
        h2 { text-align: center; }
        .order-meta { font-size: 0.9em; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>My Orders</h2>
    <div id="orders-container">Loading your orders...</div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="firebase-init.js"></script>

    <script>
        firebase.auth().onAuthStateChanged(user => {
            const container = document.getElementById('orders-container');
            
            if (!user) {
                window.location.href = "login.html"; 
                return;
            }

            const db = firebase.firestore();

            db.collection("orders")
                .where("userId", "==", user.uid)
                .orderBy("timestamp", "desc")
                .onSnapshot(snapshot => {
                    if (snapshot.empty) {
                        container.innerHTML = "You haven't placed any orders yet.";
                        return;
                    }

                    container.innerHTML = "";
                    snapshot.forEach(doc => {
                        const order = doc.data();
                        
                        // Date formatting
                        const date = order.timestamp ? order.timestamp.toDate().toLocaleString() : "Date N/A";
                        
                        // New Sequential ID Logic
                        const displayOrderId = order.orderId ? order.orderId : "N/A";

                        let itemsHtml = order.items.map(item => `
                            <div class="order-item">
                                <span>${item.productName} (x${item.qty})</span>
                                <span>₹${(parseFloat(item.price) * parseInt(item.qty)).toFixed(2)}</span>
                            </div>
                        `).join('');

                        container.innerHTML += `
                            <div class="order-card">
                                <h3>Order ID: ${displayOrderId}</h3>
                                <div class="order-meta">📅 ${date}</div>
                                <p>Status: <span class="status">${order.status || 'Pending'}</span></p>
                                <div>${itemsHtml}</div>
                                <hr>
                                <p><strong>Total Amount: ₹${order.total}</strong></p>
                            </div>
                        `;
                    });
                }, error => {
                    container.innerHTML = "Error loading orders: " + error.message;
                });
        });
    </script>
</body>
</html>
