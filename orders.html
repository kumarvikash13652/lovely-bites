<script>
    firebase.auth().onAuthStateChanged(user => {
        const container = document.getElementById('orders-container');
        if (!user) {
            container.innerHTML = "Please login first.";
            return;
        }

        console.log("Fetching orders for UID:", user.uid);

        // Sirf 10 latest orders laao, bina filter ke check karte hain
        db.collection("orders").limit(10).get()
            .then(snapshot => {
                console.log("Total orders in DB:", snapshot.size);
                
                if (snapshot.empty) {
                    container.innerHTML = "Database is empty!";
                    return;
                }

                container.innerHTML = ""; // Clear loading
                snapshot.forEach(doc => {
                    const data = doc.data();
                    console.log("Order found:", data); // Yahan console mein check karo
                    
                    // Agar tumhara userId field name alag hai, toh yahan data.userId check karo
                    container.innerHTML += `<div class="order-card">Order ID: ${doc.id}</div>`;
                });
            })
            .catch(err => {
                container.innerHTML = "Error: " + err.message;
                console.error(err);
            });
    });
</script>
