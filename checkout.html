<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Lovely Bites</title>
    <style>
        :root { --brand-red: #e31e24; --bg-cream: #fffdf5; }
        body { font-family: sans-serif; background: var(--bg-cream); padding: 20px; }
        .checkout-box { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: var(--brand-red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<main class="checkout-box">
    <h2>Delivery Details</h2>
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="email" id="email" placeholder="Email Address" required>
    <input type="text" id="address1" placeholder="Flat/House No" required>
    <input type="text" id="address2" placeholder="Street/Locality" required>
    <input type="text" id="city" placeholder="City" required>
    <input type="number" id="pincode" placeholder="Pincode" required>
    <input type="number" id="phone" placeholder="Mobile Number" required>
    
    <button type="button" id="order-btn" onclick="placeOrder()">PLACE ORDER</button>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    if (!firebase.apps.length) {
        firebase.initializeApp({
            apiKey: "AIzaSyDVE5gYyGCgAlfHw82Apna6DsMY9zE2bGs",
            authDomain: "lovelybites-e4d35.firebaseapp.com",
            projectId: "lovelybites-e4d35",
            storageBucket: "lovelybites-e4d35.firebasestorage.app",
            messagingSenderId: "650974633550",
            appId: "1:650974633550:web:14e277c8aef5db9ff4ed1f"
        });
    }

    let authUser = null;

    // FIX: Page load hote hi Auth check ka wait karo
    firebase.auth().onAuthStateChanged((user) => {
        authUser = user;
    });

    async function placeOrder() {
        // Agar user null hai, toh hi redirect karo
        if (!authUser) { 
            alert("Please login first!"); 
            window.location.href = "login.html?redirect=checkout"; 
            return; 
        }

        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        
        if(!name || !email || phone.length < 10) {
            alert("Please fill all details correctly.");
            return;
        }

        const btn = document.getElementById('order-btn');
        btn.disabled = true;
        btn.innerText = "Placing Order...";

        try {
            const db = firebase.firestore();
            const cartRef = db.collection("users").doc(authUser.uid).collection("cart");
            const cartSnapshot = await cartRef.get();
            
            if (cartSnapshot.empty) { 
                alert("Aapka cart khaali hai!"); 
                btn.disabled = false; btn.innerText = "PLACE ORDER"; return; 
            }

            let orderItems = [], totalAmount = 0;
            
            cartSnapshot.forEach(doc => {
                const item = doc.data();
                const unitPrice = parseFloat(item.price);
                const quantity = parseInt(item.qty);
                const subtotal = unitPrice * quantity; 
                
                orderItems.push({ 
                    productName: item.productName, 
                    qty: quantity, 
                    price: unitPrice,
                    subtotal: subtotal 
                });
                
                totalAmount += subtotal;
            });

            await db.collection("orders").add({
                userId: authUser.uid,
                name: name,
                email: email,
                phone: phone,
                address: `${document.getElementById('address1').value}, ${document.getElementById('address2').value}, ${document.getElementById('city').value} - ${document.getElementById('pincode').value}`,
                items: orderItems,
                total: totalAmount,
                status: "Pending",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            const batch = db.batch();
            cartSnapshot.forEach(doc => batch.delete(doc.ref));
            await batch.commit();

            alert("Order Successfully Placed!");
            window.location.href = "index.html"; 
        } catch (e) { 
            console.error(e);
            alert("Error: " + e.message); 
            btn.disabled = false;
            btn.innerText = "PLACE ORDER";
        }
    }
</script>
</body>
</html>
